name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        uses: flipperdevices/flipperzero-ufbt-action@v0.1
        id: build
        with:
          task: build
          app-dir: eth_tester

      - name: Lint
        uses: flipperdevices/flipperzero-ufbt-action@v0.1
        with:
          task: lint
          app-dir: eth_tester
          skip-setup: true
